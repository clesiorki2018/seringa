<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle da Seringa</title>

    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h1>Controle da Seringa</h1>

        <div id="loginBox">
            <input
                type="password"
                id="pin"
                placeholder="Digite o PIN"
                autocomplete="off"
            >

            <button id="btnLogin" onclick="login()">
                Entrar
            </button>
        </div>

        <hr>

        <div class="controls">
            <button id="btnInc" onclick="inc()" disabled>
                INJETAR 1 ml
            </button>

            <button id="btnDec" onclick="dec()" disabled>
                RECARREGAR 1 ml
            </button>

            <button id="btnStop" onclick="stopMotor()" disabled>
                STOP
            </button>

            <button onclick="go('calibragem')">
                Calibragem
            </button>
        </div>

        <hr>

        <p id="status">Status: aguardando login</p>
        <p id="endstops">Endstops: aguardando login</p>
        <p id="message"></p>
    </div>

    <script src="/app.js"></script>

</body>
</html>
