<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibragem</title>

    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h2>Calibragem</h2>

        <p>Steps por ml</p>

        <div class="value" id="value">---</div>

        <div class="buttons">
            <button onclick="calDec()">-</button>
            <button onclick="calInc()">+</button>
        </div>

        <button onclick="calSave()">Salvar</button>
        <button onclick="back()">Voltar</button>

        <p id="status">Status: carregando...</p>
        <p id="message"></p>
    </div>

    <script src="/app.js"></script>
</body>
</html>
